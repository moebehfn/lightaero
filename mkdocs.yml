site_name: lightaero
site_url: https://moebehfn.github.io/lightaero/
strict: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Theory:
      - Overview: theory/index.md
      - Assumptions: theory/assumptions.md
      - Aerodynamics: theory/aerodynamics.md
      - Atmosphere: theory/atmosphere.md
      - Structures: theory/structures.md
  - API Reference: api/index.md
  - Examples:
      - 3D Visualization: examples/3d-visualization.md
  - Contributing: contributing.md

theme:
  name: material
  palette:
    primary: indigo
    accent: indigo
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            show_submodules: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets

copyright: "Low-fidelity tool for research only. Not production/industry ready. | Copyright &copy; 2026 lightaero"
